<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Trading Agents — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1019;--surface:#1a1b2e;--surface2:#1e1f32;--border:#2d2e45;--border2:#3d3e55;--text:#e2e4f0;--text2:#8b8da0;--text3:#6b6d82;--green:#4ade80;--green20:#4ade8020;--yellow:#fbbf24;--yellow20:#fbbf2420;--red:#f87171;--red20:#f8717120;--blue:#60a5fa;--blue20:#3b82f620;--purple:#a78bfa;--purple20:#8b5cf620;--mono:'Cascadia Code','Fira Code','JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
a{color:var(--blue);text-decoration:none}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.header h1{font-size:18px;font-weight:600;color:var(--text)}
.header h1 span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}
.filters{display:flex;gap:8px;align-items:center}
.filters input,.filters select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--blue)}
.filters select option{background:var(--surface2);color:var(--text)}
/* Main */
.main{padding:16px 24px}
.empty{text-align:center;color:var(--text3);padding:60px 0;font-size:15px}
/* Table */
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:8px 12px;color:var(--text3);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
tbody tr:hover{background:var(--surface)}
tbody td{padding:8px 12px;font-size:13px;white-space:nowrap}
/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-buy{background:var(--green20);color:var(--green)}
.badge-hold{background:var(--yellow20);color:var(--yellow)}
.badge-sell{background:var(--red20);color:var(--red)}
.badge-pass{background:var(--green20);color:var(--green)}
.badge-revise{background:var(--yellow20);color:var(--yellow)}
.badge-reject{background:var(--red20);color:var(--red)}
.badge-quick{background:var(--purple20);color:var(--purple)}
.badge-full{background:var(--blue20);color:var(--blue)}
/* Confidence bar */
.conf-bar{display:flex;align-items:center;gap:6px}
.conf-track{width:48px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.conf-val{color:var(--text2);font-size:11px;font-family:var(--mono)}
/* Analyst dots */
.analyst-dots{display:flex;gap:2px}
.analyst-dot{width:12px;height:12px;border-radius:2px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:flex-start;padding:24px;overflow-y:auto}
.modal-overlay.active{display:flex}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:960px;min-height:400px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:600}
.modal-title .company{color:var(--text2);font-size:14px;font-weight:400;margin-left:8px}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:var(--surface2);color:var(--text)}
/* Tabs */
.tabs{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{padding:20px}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* Summary bar */
.summary-bar{display:flex;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.summary-item{display:flex;flex-direction:column;gap:2px}
.summary-item .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.summary-item .value{font-size:15px;font-weight:600}
/* Analyst cards */
.analyst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:12px}
.analyst-card{background:var(--surface2);border-radius:8px;padding:12px;border-left:3px solid var(--border2);cursor:pointer;transition:background .15s}
.analyst-card:hover{background:var(--border)}
.analyst-card.dir-buy{border-left-color:var(--green)}
.analyst-card.dir-hold{border-left-color:var(--yellow)}
.analyst-card.dir-sell{border-left-color:var(--red)}
.analyst-card .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.analyst-card .role{font-size:13px;font-weight:500;color:var(--text)}
.analyst-card .reason{font-size:11px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.analyst-card .source{font-size:10px;color:var(--text3);margin-top:4px}
/* Expanded analyst */
.analyst-expanded{background:var(--surface2);border-radius:8px;padding:16px;margin-bottom:12px;display:none}
.analyst-expanded.show{display:block}
.analyst-expanded h4{font-size:14px;margin-bottom:8px}
.analyst-expanded .md-content{font-size:13px;color:var(--text2);line-height:1.7;max-height:400px;overflow-y:auto}
.md-content h1,.md-content h2,.md-content h3,.md-content h4{color:var(--text);margin:12px 0 6px}
.md-content h1{font-size:16px}.md-content h2{font-size:15px}.md-content h3{font-size:14px}.md-content h4{font-size:13px}
.md-content p{margin:4px 0}
.md-content ul,.md-content ol{padding-left:20px;margin:4px 0}
.md-content li{margin:2px 0}
.md-content strong{color:var(--text)}.md-content em{color:var(--text2)}
.md-content code{background:var(--border);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px}
.md-content hr{border:none;border-top:1px solid var(--border);margin:12px 0}
/* Score bar */
.score-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.score-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex}
.score-bull{background:var(--green)}
.score-bear{background:var(--red)}
.score-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px}
/* Plan grid */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.plan-box{background:var(--surface2);border-radius:8px;padding:14px}
.plan-box h4{font-size:12px;font-weight:600;margin-bottom:8px}
.plan-items{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:13px}
.plan-items .k{color:var(--text3)}
/* Debate */
.debate-round{margin-bottom:12px}
.debate-round h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.debate-row{display:flex;gap:10px}
.debate-side{flex:1;border-radius:8px;padding:12px;font-size:12px;line-height:1.5}
.debate-bull{background:#4ade8010;border:1px solid #4ade8030}
.debate-bear{background:#f8717110;border:1px solid #f8717130}
.debate-side .side-label{font-weight:600;font-size:11px;margin-bottom:6px}
/* Trace table */
.trace-detail{background:var(--surface2);border-radius:8px;padding:12px;margin-top:8px;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.trace-detail .prompt-label{color:var(--blue);font-weight:600}
.trace-detail .resp-label{color:var(--green);font-weight:600}
/* JSON tree */
.jt-root{font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--text2)}
.jt-node{position:relative;padding-left:20px}
.jt-toggle{position:absolute;left:0;top:0;width:16px;cursor:pointer;color:var(--text3);user-select:none;font-size:10px;line-height:1.7}
.jt-toggle:hover{color:var(--text)}
.jt-key{color:var(--blue)}
.jt-string{color:var(--green)}
.jt-number{color:#fb923c}
.jt-bool{color:var(--purple)}
.jt-null{color:var(--text3);font-style:italic}
.jt-bracket{color:var(--text3)}
.jt-count{color:var(--text3);font-size:10px;margin-left:4px}
.jt-children{overflow:hidden}
.jt-children.collapsed{display:none}
.jt-controls{display:flex;gap:6px;margin-bottom:8px}
.jt-controls button{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:3px 10px;color:var(--text2);font-size:11px;cursor:pointer}
.jt-controls button:hover{background:var(--border);color:var(--text)}
/* Trace sections */
.trace-section{margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.trace-section-header{display:flex;align-items:center;padding:6px 12px;background:var(--surface);cursor:pointer;user-select:none;gap:8px}
.trace-section-header:hover{background:var(--surface2)}
.trace-section-body{padding:10px 12px;max-height:500px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.trace-section.collapsed .trace-section-body{display:none}
.trace-section.collapsed .trace-section-header .sec-arrow{transform:rotate(-90deg)}
.sec-arrow{font-size:10px;color:var(--text3);transition:transform .15s}
.trace-controls{display:flex;gap:4px;margin-left:auto;align-items:center}
.md-toggle{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.md-toggle:hover{background:var(--border)}
.md-toggle.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.resp-md{line-height:1.7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:var(--text2);white-space:normal}
.resp-md h1,.resp-md h2,.resp-md h3,.resp-md h4{color:var(--text);margin:10px 0 6px}
.resp-md h1{font-size:16px}.resp-md h2{font-size:15px}.resp-md h3{font-size:14px}.resp-md h4{font-size:13px}
.resp-md p{margin:4px 0}.resp-md ul,.resp-md ol{padding-left:20px;margin:4px 0}
.resp-md li{margin:2px 0}.resp-md strong{color:var(--text)}.resp-md em{color:var(--text2)}
.resp-md code{background:var(--border);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px}
.resp-md hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.resp-raw{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.copy-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--text3);font-size:12px;cursor:pointer;line-height:1}
.copy-btn:hover{color:var(--text);background:var(--border)}
/* Responsive */
@media(max-width:768px){.header{flex-direction:column;gap:12px}.plan-grid{grid-template-columns:1fr}.analyst-grid{grid-template-columns:1fr}.debate-row{flex-direction:column}}
</style>
</head>
<body>

<div class="header">
  <h1 data-i18n="title">OpenClaw Trading Agents <span>Dashboard</span></h1>
  <div class="filters">
    <input type="text" id="search" data-i18n-placeholder="searchPlaceholder" />
    <select id="mode-filter">
      <option value="" data-i18n="allModes"></option>
      <option value="quick">Quick</option>
      <option value="full">Full</option>
    </select>
    <button id="lang-toggle" style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text2);font-size:13px;cursor:pointer" title="Switch language"></button>
  </div>
</div>

<div class="main">
  <table id="report-table">
    <thead>
      <tr>
        <th data-i18n="thTicker"></th>
        <th data-i18n="thDate"></th>
        <th data-i18n="thMode"></th>
        <th data-i18n="thDirection"></th>
        <th data-i18n="thConfidence"></th>
        <th data-i18n="thAnalysts"></th>
        <th data-i18n="thCost"></th>
        <th data-i18n="thDuration"></th>
        <th data-i18n="thRisk"></th>
      </tr>
    </thead>
    <tbody id="report-tbody"></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display:none"></div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="analysts" data-i18n="tabAnalysts"></div>
      <div class="tab" data-tab="detail" data-i18n="tabDetail"></div>
      <div class="tab" data-tab="data" data-i18n="tabData"></div>
      <div class="tab" data-tab="traces" data-i18n="tabTraces"></div>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="panel-analysts"></div>
      <div class="tab-panel" id="panel-detail"></div>
      <div class="tab-panel" id="panel-data"></div>
      <div class="tab-panel" id="panel-traces"></div>
    </div>
  </div>
</div>

<script>
// ── i18n ──
const I18N = {
  zh: {
    title: 'OpenClaw Trading Agents <span>控制台</span>',
    searchPlaceholder: '搜索股票代码...',
    allModes: '全部模式',
    thTicker: '股票代码', thDate: '日期', thMode: '模式', thDirection: '方向',
    thConfidence: '信心度', thAnalysts: '分析师', thCost: '费用', thDuration: '耗时', thRisk: '风控',
    tabAnalysts: '分析师', tabDetail: '详情', tabData: '数据源', tabTraces: '调用追踪',
    labelDate: '日期', labelDirection: '方向', labelConfidence: '信心度',
    labelTokens: 'Token', labelCost: '费用', labelDuration: '耗时', labelMode: '模式',
    loading: '加载中...', empty: '暂无报告，请先运行分析。',
    loadFailed: '加载失败：',
    noDetail: '暂无详情数据。',
    noData: '暂无原始数据。',
    noTraces: '暂无调用追踪数据。',
    researchDecision: '研究决策', bull: '多头', bear: '空头',
    tradingPlan: '交易计划', riskAssessment: '风控评估',
    target: '目标价', stop: '止损价', position: '仓位', direction: '方向',
    entry: '入场信号', exit: '退出信号', risks: '风险提示',
    score: '评分', status: '状态', debate: '辩论', round: '第{n}轮',
    systemPrompt: '系统提示', response: '模型回复',
    errorPrefix: '错误：',
    roleNames: { market:'技术面', fundamentals:'基本面', news:'新闻', sentiment:'情绪', policy:'政策', hot_money:'资金流', lockup:'解禁' },
    phaseNames: { analyst:'分析师', portfolio:'组合经理', debate:'辩论', research:'研究', trader:'交易', risk_debate:'风控辩论', risk:'风控' },
  },
  en: {
    title: 'OpenClaw Trading Agents <span>Dashboard</span>',
    searchPlaceholder: 'Search ticker...',
    allModes: 'All modes',
    thTicker: 'Ticker', thDate: 'Date', thMode: 'Mode', thDirection: 'Direction',
    thConfidence: 'Confidence', thAnalysts: 'Analysts', thCost: 'Cost', thDuration: 'Duration', thRisk: 'Risk',
    tabAnalysts: 'Analysts', tabDetail: 'Detail', tabData: 'Raw Data', tabTraces: 'Traces',
    labelDate: 'Date', labelDirection: 'Direction', labelConfidence: 'Confidence',
    labelTokens: 'Tokens', labelCost: 'Cost', labelDuration: 'Duration', labelMode: 'Mode',
    loading: 'Loading...', empty: 'No reports found. Run an analysis first.',
    loadFailed: 'Failed to load reports: ',
    noDetail: 'No detail data available.',
    noData: 'No raw data available.',
    noTraces: 'No traces available.',
    researchDecision: 'Research Decision', bull: 'Bull', bear: 'Bear',
    tradingPlan: 'Trading Plan', riskAssessment: 'Risk Assessment',
    target: 'Target', stop: 'Stop', position: 'Position', direction: 'Direction',
    entry: 'Entry', exit: 'Exit', risks: 'Risks',
    score: 'Score', status: 'Status', debate: 'Debate', round: 'Round {n}',
    systemPrompt: 'System prompt', response: 'Response',
    errorPrefix: 'Error: ',
    roleNames: { market:'Market', fundamentals:'Fundamentals', news:'News', sentiment:'Sentiment', policy:'Policy', hot_money:'Hot Money', lockup:'Lockup' },
    phaseNames: { analyst:'Analyst', portfolio:'Portfolio', debate:'Debate', research:'Research', trader:'Trader', risk_debate:'Risk Debate', risk:'Risk' },
  }
};

let lang = localStorage.getItem('dashboard-lang') || 'zh';
function t(key) { return I18N[lang]?.[key] ?? I18N.en[key] ?? key; }
function roleName(role) { return I18N[lang]?.roleNames?.[role] || capitalize(role); }
function phaseName(phase) { return I18N[lang]?.phaseNames?.[phase] || phase; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (key === 'title') { el.innerHTML = t(key); return; }
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  const btn = document.getElementById('lang-toggle');
  btn.textContent = lang === 'zh' ? 'EN' : '中文';
  document.title = lang === 'zh' ? 'OpenClaw Trading Agents — 控制台' : 'OpenClaw Trading Agents — Dashboard';
}

// ── State ──
let reports = [];
let currentReport = null;
let currentTraces = [];

// ── Init ──
(async function init() {
  applyI18n();
  document.getElementById('lang-toggle').addEventListener('click', () => {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('dashboard-lang', lang);
    applyI18n();
    renderTable();
    if (currentReport) openModal(currentReport.id);
  });

  try {
    const res = await fetch('/api/reports');
    reports = await res.json();
    renderTable();
  } catch (e) {
    const em = document.getElementById('empty-msg');
    em.style.display = 'block';
    em.textContent = t('loadFailed') + e.message;
  }

  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('mode-filter').addEventListener('change', renderTable);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });
})();

// ── Render table ──
function renderTable() {
  const search = document.getElementById('search').value.trim().toLowerCase();
  const modeFilter = document.getElementById('mode-filter').value;
  const tbody = document.getElementById('report-tbody');
  const empty = document.getElementById('empty-msg');

  let filtered = reports;
  if (search) filtered = filtered.filter(r => r.ticker.includes(search) || r.company_name.toLowerCase().includes(search));
  if (modeFilter) filtered = filtered.filter(r => r.mode === modeFilter);

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    empty.textContent = t('empty');
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const dirClass = directionClass(r.direction);
    const dots = renderDots(r.analyst_verdicts);
    const conf = (r.confidence * 100).toFixed(0);
    const confColor = r.confidence >= 0.7 ? 'var(--green)' : r.confidence >= 0.4 ? 'var(--yellow)' : 'var(--red)';
    const cost = r.total_cost_usd < 0.01 ? '<$0.01' : '$' + r.total_cost_usd.toFixed(2);
    const dur = r.duration_ms < 1000 ? r.duration_ms + 'ms' : (r.duration_ms / 1000).toFixed(1) + 's';
    const riskBadge = r.risk_assessment ? badgeHtml(r.risk_assessment, 'badge-' + r.risk_assessment) : '<span style="color:var(--text3)">—</span>';

    return `<tr data-id="${r.id}">
      <td style="font-weight:500">${r.ticker}</td>
      <td style="color:var(--text2)">${r.date}</td>
      <td>${badgeHtml(r.mode, 'badge-' + r.mode)}</td>
      <td>${badgeHtml(r.direction, dirClass)}</td>
      <td><div class="conf-bar"><div class="conf-track"><div class="conf-fill" style="width:${conf}%;background:${confColor}"></div></div><span class="conf-val">${conf}%</span></div></td>
      <td>${dots}</td>
      <td style="color:var(--text2);font-size:12px">${cost}</td>
      <td style="color:var(--text2);font-size:12px">${dur}</td>
      <td>${riskBadge}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => openModal(tr.dataset.id));
  });
}

function renderDots(verdicts) {
  const order = ['market','fundamentals','news','sentiment','policy','hot_money','lockup'];
  if (!verdicts || Object.keys(verdicts).length === 0) return '<span style="color:var(--text3)">—</span>';
  return '<div class="analyst-dots">' + order.filter(r => verdicts[r]).map(role => {
    const dir = verdicts[role].direction || '中性';
    const color = dir.includes('看多') || dir === 'Buy' || dir === 'Overweight' ? 'var(--green)' : dir.includes('看空') || dir === 'Sell' || dir === 'Underweight' ? 'var(--red)' : 'var(--yellow)';
    return `<div class="analyst-dot" style="background:${color}" title="${roleName(role)}: ${dir}"></div>`;
  }).join('') + '</div>';
}

function badgeHtml(text, cls) {
  return `<span class="badge ${cls}">${text}</span>`;
}

function directionClass(dir) {
  if (!dir) return 'badge-hold';
  const d = dir.toLowerCase();
  if (d === 'buy' || d === 'overweight' || d === 'strong buy') return 'badge-buy';
  if (d === 'sell' || d === 'underweight' || d === 'strong sell') return 'badge-sell';
  return 'badge-hold';
}

// ── Modal ──
async function openModal(id) {

    `${report.ticker} <span class="company">${report.company_name}</span>`;

  const dirCls = directionClass(report.direction);

  const cost = report.total_cost_usd < 0.01 ? '<$0.01' : '$' + report.total_cost_usd.toFixed(2);

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item"><span class="label">${t('labelDate')}</span><span class="value">${report.date}</span></div>
    <div class="summary-item"><span class="label">${t('labelDirection')}</span><span class="value">${badgeHtml(report.direction, dirCls)}</span></div>
    <div class="summary-item"><span class="label">${t('labelConfidence')}</span><span class="value">${conf}%</span></div>

    <div class="summary-item"><span class="label">${t('labelCost')}</span><span class="value">${cost}</span></div>
    <div class="summary-item"><span class="label">${t('labelDuration')}</span><span class="value">${dur}</span></div>
    <div class="summary-item"><span class="label">${t('labelMode')}</span><span class="value">${badgeHtml(report.mode, 'badge-' + report.mode)}</span></div>
  `;

  const detailTab = document.querySelector('.tab[data-tab="detail"]');
  detailTab.style.display = report.mode === 'full' ? '' : 'none';

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

function closeModal() {

async function loadDebateRounds(ticker, detailPath) {
  const rounds = [];

}

// ── Helpers ──
async function fetchJson(url) {
  try {
    const res = await fetch(url);
    return res.ok ? await res.json() : null;
  } catch { return null; }
}

function capitalize(s) {
  if (!s) return '';
  return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function formatNum(n) {
  if (n == null) return '—';
  return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

// ── JSON tree viewer ──
function renderJsonTree(data, key, depth) {
  if (depth === undefined) depth = 0;
  const indent = '  '.repeat(depth);
  let html = '';

  if (data === null) {
    html += `<span class="jt-null">null</span>`;
    return html;
  }

  const type = typeof data;
  if (type === 'string') {
    const s = escapeHtml(data);
    if (data.length > 80) {
      html += `<span class="jt-string">"${s.slice(0, 80)}<span style="color:var(--text3)">…"</span> <span class="jt-count">(${data.length} chars)</span></span>`;
    } else {
      html += `<span class="jt-string">"${s}"</span>`;
    }
    return html;
  }
  if (type === 'number') {
    html += `<span class="jt-number">${data}</span>`;
    return html;
  }
  if (type === 'boolean') {
    html += `<span class="jt-bool">${data}</span>`;
    return html;
  }

  if (Array.isArray(data)) {
    if (data.length === 0) {
      html += `<span class="jt-bracket">[]</span>`;
      return html;
    }
    const collapsed = depth >= 2;
    html += `<span class="jt-toggle" onclick="toggleJsonNode(this)">${collapsed ? '▶' : '▼'}</span>`;
    html += `<span class="jt-bracket">[</span><span class="jt-count">${data.length} items</span>`;
    html += `<div class="jt-children${collapsed ? ' collapsed' : ''}">`;
    for (let i = 0; i < data.length; i++) {
      html += `<div class="jt-node">${renderJsonTree(data[i], String(i), depth + 1)}</div>`;
    }
    html += `</div>`;
    html += `<span class="jt-bracket">]</span>`;
    return html;
  }

  if (type === 'object') {
    const keys = Object.keys(data);
    if (keys.length === 0) {
      html += `<span class="jt-bracket">{}</span>`;
      return html;
    }
    const collapsed = depth >= 2;
    html += `<span class="jt-toggle" onclick="toggleJsonNode(this)">${collapsed ? '▶' : '▼'}</span>`;
    html += `<span class="jt-bracket">{</span><span class="jt-count">${keys.length} fields</span>`;
    html += `<div class="jt-children${collapsed ? ' collapsed' : ''}">`;
    for (const k of keys) {
      html += `<div class="jt-node"><span class="jt-key">"${escapeHtml(k)}"</span>: ${renderJsonTree(data[k], k, depth + 1)}</div>`;
    }
    html += `</div>`;
    html += `<span class="jt-bracket">}</span>`;
    return html;
  }

  return escapeHtml(String(data));
}

function toggleJsonNode(el) {
  const children = el.parentElement.querySelector(':scope > .jt-children');
  if (!children) return;
  const isCollapsed = children.classList.toggle('collapsed');
  el.textContent = isCollapsed ? '▶' : '▼';
}

function expandAllTree(container) {
  container.querySelectorAll('.jt-children.collapsed').forEach(el => {
    el.classList.remove('collapsed');
  });
  container.querySelectorAll('.jt-toggle').forEach(el => {
    el.textContent = '▼';
  });
}

function collapseAllTree(container) {
  container.querySelectorAll('.jt-children').forEach(el => {
    el.classList.add('collapsed');
  });
  container.querySelectorAll('.jt-toggle').forEach(el => {
    el.textContent = '▶';
  });
}

function summarizeData(role, data) {
  if (!data || typeof data !== 'object') return '';
  const parts = [];
  if (Array.isArray(data)) {
    parts.push(`${data.length} 条记录`);
    return parts.join(' · ');
  }
  // Role-specific summaries
  if (role === 'market' && data.data) {
    if (Array.isArray(data.data)) parts.push(`${data.data.length} 条K线`);
    if (data.ticker) parts.push(data.ticker);
  } else if (role === 'fundamentals') {
    const keys = Object.keys(data);
    parts.push(`${keys.length} 项指标`);
  } else if (role === 'news' && data.news) {
    const n = Array.isArray(data.news) ? data.news.length : 0;
    parts.push(`${n} 条新闻`);
  } else {
    parts.push(`${Object.keys(data).length} 个字段`);
  }
  return parts.join(' · ');
}

function copyContent(btn, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {});
}

function toggleMdMode(btn) {
  const idx = btn.dataset.idx;
  const mode = btn.dataset.mode;
  const container = document.getElementById('resp-' + idx);
  if (!container) return;
  const mdDiv = container.querySelector('.resp-md');
  const rawDiv = container.querySelector('.resp-raw');
  if (!mdDiv || !rawDiv) return;
  // Update toggle buttons
  container.closest('.trace-section').querySelectorAll('.md-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (mode === 'md') {
    mdDiv.style.display = '';
    rawDiv.style.display = 'none';
  } else {
    mdDiv.style.display = 'none';
    rawDiv.style.display = '';
  }
}

// ── Simple markdown → HTML ──
function renderMd(md) {
  if (!md) return '';
  let html = escapeHtml(md);
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/((?:^[*\-] .+$\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^[*\-] /, '') + '</li>').join('');
    return '<ul>' + items + '</ul>';
  });
  html = html.replace(/((?:^\d+\. .+$\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return '<ol>' + items + '</ol>';
  });
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/\n\n+/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*(<\/?(?:h[1-6]|ul|ol|li|hr|div|table)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-6]|ul|ol|li|hr|div|table)>)\s*<\/p>/g, '$1');
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
