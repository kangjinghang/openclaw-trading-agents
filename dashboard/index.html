// ── Cost & Token breakdown for traces ──
function renderCostOverview(traces) {
  if (!traces || traces.length === 0) return '';
  const totalCost = traces.reduce((s, t) => s + (t.meta?.cost_usd || 0), 0);
  const totalTokens = traces.reduce((s, t) => s + (t.meta?.usage?.total_tokens || 0), 0);
  const totalDuration = traces.reduce((s, t) => s + (t.meta?.duration_ms || 0), 0);
  const durStr = totalDuration >= 60000 ? (totalDuration / 60000).toFixed(1) + 'min' :
    totalDuration >= 1000 ? (totalDuration / 1000).toFixed(1) + 's' : totalDuration + 'ms';

  return `
    <div class="cost-overview">
      <div class="cost-card">
        <div class="cc-val">$${totalCost.toFixed(4)}</div>
        <div class="cc-label">${lang === 'zh' ? '总费用' : 'Total Cost'}</div>
      </div>
      <div class="cost-card">
        <div class="cc-val">${totalTokens.toLocaleString()}</div>
        <div class="cc-label">${lang === 'zh' ? '总 Token' : 'Total Tokens'}</div>
      </div>
      <div class="cost-card">
        <div class="cc-val">${durStr}</div>
        <div class="cc-label">${lang === 'zh' ? '总耗时' : 'Duration'}</div>
      </div>
    </div>`;
}

function renderPhaseBreakdown(traces) {
  if (!traces || traces.length < 2) return '';
  // Group by phase
  const phases = {};
  for (const tr of traces) {
    const phase = tr.phase || 'unknown';
    if (!phases[phase]) phases[phase] = { cost: 0, tokens: 0, duration: 0, count: 0 };
    phases[phase].cost += tr.meta?.cost_usd || 0;
    phases[phase].tokens += tr.meta?.usage?.total_tokens || 0;
    phases[phase].duration += tr.meta?.duration_ms || 0;
    phases[phase].count++;
  }

  const maxDuration = Math.max(...Object.values(phases).map(p => p.duration), 1);

  let html = `<div class="phase-bars"><h5>${lang === 'zh' ? '阶段耗时分布' : 'Phase Duration Breakdown'}</h5>`;
  for (const [phase, info] of Object.entries(phases)) {
    const pct = (info.duration / maxDuration * 100).toFixed(1);
    const c = phaseColors[phase] || ['var(--border2)','var(--text2)'];
    const durStr = info.duration >= 1000 ? (info.duration / 1000).toFixed(1) + 's' : info.duration + 'ms';
    const label = phaseName(phase);
    html += `<div class="pb-row">
      <div class="pb-label">${label}</div>
      <div class="pb-track">
        <div class="pb-seg" style="width:${pct}%;background:${c[1]}">${info.count > 1 ? info.count + 'x' : ''}</div>
      </div>
      <div class="pb-val">${durStr}</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

// ── K-line candlestick chart ──
let klineChartInstance = null;

function renderKlineSection(ds) {
  if (!ds.success || !ds.data || !Array.isArray(ds.data.data) || ds.data.data.length === 0) {
    if (!ds.success) {
      return `<div style="padding:16px;text-align:center;color:var(--text3)">${lang === 'zh' ? '⚠️ 数据获取失败，无法渲染K线图' : '⚠️ Data fetch failed, cannot render K-line chart'}</div>`;
    }
    return '';
  }

  const candles = ds.data.data;
  const chartId = 'kline-chart-' + Date.now();
  const vpa = ds.vpa || '';
  const ti = ds.technical_indicators || '';

  let indicatorsHtml = '';
  if (vpa || ti) {
    indicatorsHtml = `<div class="kline-indicators">`;
    if (vpa) indicatorsHtml += `<div class="kline-indicator-box"><h5>VPA 量价分析</h5><div class="md-content">${renderMd(vpa)}</div></div>`;
    if (ti) indicatorsHtml += `<div class="kline-indicator-box"><h5>${lang === 'zh' ? '技术指标' : 'Technical Indicators'}</h5><div class="md-content">${renderMd(ti)}</div></div>`;
    indicatorsHtml += `</div>`;
  }

  // Delay chart rendering with setTimeout so the DOM is ready
  setTimeout(() => {
    const container = document.getElementById(chartId);
    if (!container || typeof LightweightCharts === 'undefined') return;

    const chart = LightweightCharts.createChart(container, {
      width: container.clientWidth,
      height: 400,
      layout: {
        background: { color: '#1a1b2e' },
        textColor: '#8b8da0',
        fontSize: 11,
      },
      grid: {
        vertLines: { color: '#2d2e45' },
        horzLines: { color: '#2d2e45' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#2d2e45' },
      timeScale: { borderColor: '#2d2e45', timeVisible: false },
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: '#4ade80',
      downColor: '#f87171',
      borderUpColor: '#4ade80',
      borderDownColor: '#f87171',
      wickUpColor: '#4ade80',
      wickDownColor: '#f87171',
    });

    const volumeSeries = chart.addHistogramSeries({
      color: '#60a5fa',
      priceFormat: { type: 'volume' },
      priceScaleId: '',
    });

    volumeSeries.priceScale().applyOptions({
      scaleMargins: { top: 0.8, bottom: 0 },
    });

    const klineData = candles.map(c => ({
      time: c.date,
      open: c.open,
      high: c.high,
      low: c.low,
      close: c.close,
    }));

    const volumeData = candles.map(c => ({
      time: c.date,
      value: c.volume || 0,
      color: c.close >= c.open ? '#4ade8040' : '#f8717140',
    }));

    candleSeries.setData(klineData);
    volumeSeries.setData(volumeData);
    chart.timeScale().fitContent();

    // Resize observer
    const ro = new ResizeObserver(() => chart.applyOptions({ width: container.clientWidth }));
    ro.observe(container);
    klineChartInstance = { chart, ro };
  }, 50);

  return `
    <div class="kline-section">
      ${indicatorsHtml}
      <div class="kline-chart" id="${chartId}"></div>
    </div>`;
}

// ── News timeline ──
function renderNewsTimeline(ds) {
  if (!ds.success || !ds.data) return '';
  const data = ds.data;
  const news = data.stock_news || [];
  const layers = data.news_layers || {};
  const stats = data.layer_stats || {};

  let html = '<div class="news-timeline">';

  // Layer stats badges
  if (Object.keys(stats).length > 0) {
    html += '<div class="news-stats">';
    if (stats.realtime_6h_count !== undefined) html += `<span class="news-stat">🕐 ${lang === 'zh' ? '近6小时' : '6h'}: ${stats.realtime_6h_count}</span>`;
    if (stats.extended_24h_count !== undefined) html += `<span class="news-stat">📅 ${lang === 'zh' ? '6-24小时' : '6-24h'}: ${stats.extended_24h_count}</span>`;
    if (stats.history_7d_count !== undefined) html += `<span class="news-stat">📋 ${lang === 'zh' ? '1-7天' : '1-7d'}: ${stats.history_7d_count}</span>`;
    html += `<span class="news-stat">${lang === 'zh' ? '总计' : 'Total'}: ${news.length}</span>`;
    html += '</div>';
  }

  // Group by date
  const groups = {};
  for (const item of news) {
    const date = (item.time || '').split(/[\sT]/)[0] || (lang === 'zh' ? '未知日期' : 'Unknown');
    if (!groups[date]) groups[date] = [];
    groups[date].push(item);
  }

  for (const [date, items] of Object.entries(groups)) {
    html += `<div class="news-date">
      <div class="news-date-label">${date} (${items.length}${lang === 'zh' ? '条' : ''})</div>`;
    for (const n of items) {
      const time = (n.time || '').split(/[\sT]/)[1] || '';
      html += `<div class="news-card">
        <div class="news-time">${time}</div>
        <div>
          <div class="news-title">${escapeHtml(n.title || '')}</div>
          <div class="news-content">${escapeHtml((n.content || '').slice(0, 200))}</div>
          <div class="news-source">${escapeHtml(n.source || '')}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ── JSON tree viewer ──
function renderJsonTree(data, key, depth) {
  if (depth === undefined) depth = 0;
  const indent = '  '.repeat(depth);
  let html = '';

  if (data === null) {
    html += `<span class="jt-null">null</span>`;
    return html;
  }

  const type = typeof data;
  if (type === 'string') {
    const s = escapeHtml(data);
    if (data.length > 80) {
      html += `<span class="jt-string">"${s.slice(0, 80)}<span style="color:var(--text3)">…"</span> <span class="jt-count">(${data.length} chars)</span></span>`;
    } else {
      html += `<span class="jt-string">"${s}"</span>`;
    }
    return html;
  }
  if (type === 'number') {
    html += `<span class="jt-number">${data}</span>`;
    return html;
  }
  if (type === 'boolean') {
    html += `<span class="jt-bool">${data}</span>`;
    return html;
  }

  if (Array.isArray(data)) {
    if (data.length === 0) {
      html += `<span class="jt-bracket">[]</span>`;
      return html;
    }
    const collapsed = depth >= 2;
    html += `<span class="jt-toggle" onclick="toggleJsonNode(this)">${collapsed ? '▶' : '▼'}</span>`;
    html += `<span class="jt-bracket">[</span><span class="jt-count">${data.length} items</span>`;
    html += `<div class="jt-children${collapsed ? ' collapsed' : ''}">`;
    for (let i = 0; i < data.length; i++) {
      html += `<div class="jt-node">${renderJsonTree(data[i], String(i), depth + 1)}</div>`;
    }
    html += `</div>`;
    html += `<span class="jt-bracket">]</span>`;
    return html;
  }

  if (type === 'object') {
    const keys = Object.keys(data);
    if (keys.length === 0) {
      html += `<span class="jt-bracket">{}</span>`;
      return html;
    }
    const collapsed = depth >= 2;
    html += `<span class="jt-toggle" onclick="toggleJsonNode(this)">${collapsed ? '▶' : '▼'}</span>`;
    html += `<span class="jt-bracket">{</span><span class="jt-count">${keys.length} fields</span>`;
    html += `<div class="jt-children${collapsed ? ' collapsed' : ''}">`;
    for (const k of keys) {
      html += `<div class="jt-node"><span class="jt-key">"${escapeHtml(k)}"</span>: ${renderJsonTree(data[k], k, depth + 1)}</div>`;
    }
    html += `</div>`;
    html += `<span class="jt-bracket">}</span>`;
    return html;
  }

  return escapeHtml(String(data));
}

function toggleJsonNode(el) {
  const children = el.parentElement.querySelector(':scope > .jt-children');
  if (!children) return;
  const isCollapsed = children.classList.toggle('collapsed');
  el.textContent = isCollapsed ? '▶' : '▼';
}

function expandAllTree(container) {
  container.querySelectorAll('.jt-children.collapsed').forEach(el => {
    el.classList.remove('collapsed');
  });
  container.querySelectorAll('.jt-toggle').forEach(el => {
    el.textContent = '▼';
  });
}

function collapseAllTree(container) {
  container.querySelectorAll('.jt-children').forEach(el => {
    el.classList.add('collapsed');
  });
  container.querySelectorAll('.jt-toggle').forEach(el => {
    el.textContent = '▶';
  });
}

function summarizeData(role, data) {
  if (!data || typeof data !== 'object') return '';
  const parts = [];
  if (Array.isArray(data)) {
    parts.push(`${data.length} 条记录`);
    return parts.join(' · ');
  }
  // Role-specific summaries
  if (role === 'market' && data.data) {
    if (Array.isArray(data.data)) parts.push(`${data.data.length} 条K线`);
    if (data.ticker) parts.push(data.ticker);
  } else if (role === 'fundamentals') {
    const keys = Object.keys(data);
    parts.push(`${keys.length} 项指标`);
  } else if (role === 'news' && data.news) {
    const n = Array.isArray(data.news) ? data.news.length : 0;
    parts.push(`${n} 条新闻`);
  } else {
    parts.push(`${Object.keys(data).length} 个字段`);
  }
  return parts.join(' · ');
}

function copyContent(btn, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {});
}

function toggleMdMode(btn) {
  const idx = btn.dataset.idx;
  const mode = btn.dataset.mode;
  const container = document.getElementById('resp-' + idx);
  if (!container) return;
  const mdDiv = container.querySelector('.resp-md');
  const rawDiv = container.querySelector('.resp-raw');
  if (!mdDiv || !rawDiv) return;
  // Update toggle buttons
  container.closest('.trace-section').querySelectorAll('.md-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (mode === 'md') {
    mdDiv.style.display = '';
    rawDiv.style.display = 'none';
  } else {
    mdDiv.style.display = 'none';
    rawDiv.style.display = '';
  }
}

// ── Simple markdown → HTML ──
function renderMd(md) {
  if (!md) return '';
  let html = escapeHtml(md);
  // Bold-wrapped headings: **### heading** (LLM sometimes wraps headings in **)
  html = html.replace(/^\*\*#### (.+?)\*\*$/gm, '<h4>$1</h4>');
  html = html.replace(/^\*\*### (.+?)\*\*$/gm, '<h3>$1</h3>');
  html = html.replace(/^\*\*## (.+?)\*\*$/gm, '<h2>$1</h2>');
  html = html.replace(/^\*\*# (.+?)\*\*$/gm, '<h1>$1</h1>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/((?:^[*\-] .+$\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^[*\-] /, '') + '</li>').join('');
    return '<ul>' + items + '</ul>';
  });
  html = html.replace(/((?:^\d+\. .+$\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return '<ol>' + items + '</ol>';
  });
  // Markdown tables: | header | header |\n|---|---|\n| cell | cell |
  html = html.replace(/((?:^\|[^\n]+\|$\n?){2,})/gm, match => {
    const lines = match.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) return match;
    // Check separator line (second line)
    const sep = lines[1].trim();
    if (!/^\|[\s\-:|]+\|$/.test(sep)) return match;
    const parseRow = (line) => line.split('|').slice(1, -1).map(c => c.trim());
    const headers = parseRow(lines[0]);
    let table = '<table><thead><tr>';
    for (const h of headers) table += '<th>' + h + '</th>';
    table += '</tr></thead><tbody>';
    for (let i = 2; i < lines.length; i++) {
      const cells = parseRow(lines[i]);
      table += '<tr>';
      for (const c of cells) table += '<td>' + c + '</td>';
      table += '</tr>';
    }
    table += '</tbody></table>';
    return table;
  });
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/\n\n+/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*(<\/?(?:h[1-6]|ul|ol|li|hr|div|table)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-6]|ul|ol|li|hr|div|table)>)\s*<\/p>/g, '$1');
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
