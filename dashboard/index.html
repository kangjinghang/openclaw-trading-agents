<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Trading Agents — Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1019;--surface:#1a1b2e;--surface2:#1e1f32;--border:#2d2e45;--border2:#3d3e55;--text:#e2e4f0;--text2:#8b8da0;--text3:#6b6d82;--green:#4ade80;--green20:#4ade8020;--yellow:#fbbf24;--yellow20:#fbbf2420;--red:#f87171;--red20:#f8717120;--blue:#60a5fa;--blue20:#3b82f620;--purple:#a78bfa;--purple20:#8b5cf620;--mono:'Cascadia Code','Fira Code','JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
a{color:var(--blue);text-decoration:none}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.header h1{font-size:18px;font-weight:600;color:var(--text)}
.header h1 span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}
.filters{display:flex;gap:8px;align-items:center}
.filters input,.filters select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--blue)}
.filters select option{background:var(--surface2);color:var(--text)}
/* Main */
.main{padding:16px 24px}
.empty{text-align:center;color:var(--text3);padding:60px 0;font-size:15px}
/* Table */
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:8px 12px;color:var(--text3);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
tbody tr:hover{background:var(--surface)}
tbody td{padding:8px 12px;font-size:13px;white-space:nowrap}
/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-buy{background:var(--green20);color:var(--green)}
.badge-hold{background:var(--yellow20);color:var(--yellow)}
.badge-sell{background:var(--red20);color:var(--red)}
.badge-pass{background:var(--green20);color:var(--green)}
.badge-revise{background:var(--yellow20);color:var(--yellow)}
.badge-reject{background:var(--red20);color:var(--red)}
.badge-quick{background:var(--purple20);color:var(--purple)}
.badge-full{background:var(--blue20);color:var(--blue)}
/* Confidence bar */
.conf-bar{display:flex;align-items:center;gap:6px}
.conf-track{width:48px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.conf-val{color:var(--text2);font-size:11px;font-family:var(--mono)}
/* Analyst dots */
.analyst-dots{display:flex;gap:2px}
.analyst-dot{width:12px;height:12px;border-radius:2px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:flex-start;padding:24px;overflow-y:auto}
.modal-overlay.active{display:flex}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:960px;min-height:400px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:600}
.modal-title .company{color:var(--text2);font-size:14px;font-weight:400;margin-left:8px}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:var(--surface2);color:var(--text)}
/* Tabs */
.tabs{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{padding:20px}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* Summary bar */
.summary-bar{display:flex;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.summary-item{display:flex;flex-direction:column;gap:2px}
.summary-item .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.summary-item .value{font-size:15px;font-weight:600}
/* Analyst cards */
.analyst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:12px}
.analyst-card{background:var(--surface2);border-radius:8px;padding:12px;border-left:3px solid var(--border2);cursor:pointer;transition:all .2s}
.analyst-card:hover{background:var(--border);transform:translateY(-1px)}
.analyst-card.dir-buy{border-left-color:var(--green)}
.analyst-card.dir-hold{border-left-color:var(--yellow)}
.analyst-card.dir-sell{border-left-color:var(--red)}
.analyst-card.selected{box-shadow:0 0 0 1px var(--blue);background:var(--surface)}
.analyst-card .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.analyst-card .role{font-size:13px;font-weight:500;color:var(--text)}
.analyst-card .reason{font-size:11px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.analyst-card .source{font-size:10px;color:var(--text3);margin-top:4px}
.analyst-card .no-content{font-size:10px;color:var(--text3);font-style:italic;margin-top:4px}
/* Expanded analyst */
.analyst-expanded{background:var(--surface2);border-radius:8px;padding:16px;margin-bottom:12px;display:none}
.analyst-expanded.show{display:block}
.analyst-expanded h4{font-size:14px;margin-bottom:8px}
.analyst-expanded .md-content{font-size:13px;color:var(--text2);line-height:1.7;max-height:500px;overflow-y:auto}
.ae-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ae-verdict{font-size:20px;font-weight:700;padding:6px 16px;border-radius:8px}
.ae-verdict.v-buy{background:var(--green20);color:var(--green)}
.ae-verdict.v-hold{background:var(--yellow20);color:var(--yellow)}
.ae-verdict.v-sell{background:var(--red20);color:var(--red)}
.ae-meta{display:flex;flex-direction:column;gap:2px}
.ae-reason{font-size:12px;color:var(--text2);line-height:1.5}
.ae-datasources{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.ae-ds{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--border);color:var(--text3)}
.ae-ds.ds-fail{background:var(--red20);color:var(--red)}
.ae-section{margin-top:12px}
.ae-section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.md-content h1,.md-content h2,.md-content h3,.md-content h4{color:var(--text);margin:12px 0 6px}
.md-content h1{font-size:16px}.md-content h2{font-size:15px}.md-content h3{font-size:14px}.md-content h4{font-size:13px}
.md-content p{margin:4px 0}
.md-content ul,.md-content ol{padding-left:20px;margin:4px 0}
.md-content li{margin:2px 0}
.md-content strong{color:var(--text)}.md-content em{color:var(--text2)}
.md-content code{background:var(--border);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px}
.md-content hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.md-content table,.resp-md table{width:100%;border-collapse:collapse;margin:8px 0 12px;font-size:12px}
.md-content th,.md-content td,.resp-md th,.resp-md td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:normal}
.md-content th,.resp-md th{color:var(--text);font-weight:600;background:var(--surface);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.md-content td,.resp-md td{color:var(--text2)}
.md-content tr:hover td,.resp-md tr:hover td{background:var(--surface2)}
/* Score bar */
.score-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.score-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex}
.score-bull{background:var(--green)}
.score-bear{background:var(--red)}
.score-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px}
/* Plan grid */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.plan-box{background:var(--surface2);border-radius:8px;padding:14px}
.plan-box h4{font-size:12px;font-weight:600;margin-bottom:8px}
.plan-items{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:13px}
.plan-items .k{color:var(--text3)}
/* Quality gate card */
.quality-card{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid var(--border)}
.quality-card h4{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.quality-grades{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.quality-grade{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2)}
.grade-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:11px;font-weight:700}
.g-a{background:var(--green20);color:var(--green)}
.g-b{background:#4ade8030;color:#86efac}
.g-c{background:var(--yellow20);color:var(--yellow)}
.g-d{background:#fb923c20;color:#fb923c}
.g-f{background:var(--red20);color:var(--red)}
.quality-layer2{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;margin-top:6px}
.cred-badge{padding:2px 10px;border-radius:4px;font-weight:600}
.cred-high{background:var(--green20);color:var(--green)}
.cred-mid{background:var(--yellow20);color:var(--yellow)}
.cred-low{background:var(--red20);color:var(--red)}
.quality-chip{padding:2px 8px;border-radius:3px;font-size:11px;background:var(--border);color:var(--text3)}
.quality-chip.chip-warn{background:var(--red20);color:var(--red)}
.quality-chip.chip-stale{background:#fb923c20;color:#fb923c}
/* Risk judge constraints */
.judge-constraints{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.constraint-group{font-size:12px;line-height:1.5}
.constraint-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.constraint-group ul{padding-left:16px;margin:2px 0 0}
.constraint-group li{color:var(--text2);margin:1px 0}
.constraint-hard li{color:var(--red)}
.constraint-derisk li{color:#fb923c}
.warn-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--red20);color:var(--red);margin-left:6px}
.prov-chain{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:8px 0 16px}
.prov-step{display:inline-flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);min-width:70px;font-size:12px}
.prov-step .prov-label{font-weight:600;color:var(--text1);margin-bottom:2px}
.prov-step .prov-decision{color:var(--text2);font-size:11px}
.prov-arrow{color:var(--text3);font-size:16px}
/* Review flags — silent-fallback warnings + cross-stage anomalies, shown at
   the top of the detail panel so a reviewer sees where the run degraded. */
.review-flags{background:var(--surface2);border:1px solid var(--red);border-radius:8px;padding:12px 14px;margin-bottom:16px}
.flag-list{list-style:none;padding:0;margin:0}
.flag-list li{padding:5px 0;font-size:12.5px;line-height:1.5;color:var(--text2);border-bottom:1px solid var(--border)}
.flag-list li:last-child{border-bottom:none}
.flag-list b{color:var(--text)}
.flag-err{color:var(--red);font-weight:700;margin-right:6px}
.flag-warn{color:#fbbf24;font-weight:700;margin-right:6px}
/* Debate */
.debate-round{margin-bottom:12px}
.debate-round h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.debate-row{display:flex;gap:10px}
.debate-side{flex:1;border-radius:8px;padding:12px;font-size:12px;line-height:1.5}
.debate-bull{background:#4ade8010;border:1px solid #4ade8030}
.debate-bear{background:#f8717110;border:1px solid #f8717130}
.debate-side .side-label{font-weight:600;font-size:11px;margin-bottom:6px}
/* Trace table */
.trace-detail{background:var(--surface2);border-radius:8px;padding:12px;margin-top:8px;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.trace-detail .prompt-label{color:var(--blue);font-weight:600}
.trace-detail .resp-label{color:var(--green);font-weight:600}
/* JSON tree */
.jt-root{font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--text2)}
.jt-node{position:relative;padding-left:20px}
.jt-toggle{position:absolute;left:0;top:0;width:16px;cursor:pointer;color:var(--text3);user-select:none;font-size:10px;line-height:1.7}
.jt-toggle:hover{color:var(--text)}
.jt-key{color:var(--blue)}
.jt-string{color:var(--green)}
.jt-number{color:#fb923c}
.jt-bool{color:var(--purple)}
.jt-null{color:var(--text3);font-style:italic}
.jt-bracket{color:var(--text3)}
.jt-count{color:var(--text3);font-size:10px;margin-left:4px}
.jt-children{overflow:hidden}
.jt-children.collapsed{display:none}
.jt-controls{display:flex;gap:6px;margin-bottom:8px}
.jt-controls button{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:3px 10px;color:var(--text2);font-size:11px;cursor:pointer}
.jt-controls button:hover{background:var(--border);color:var(--text)}
/* Trace sections */
.trace-section{margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.trace-section-header{display:flex;align-items:center;padding:6px 12px;background:var(--surface);cursor:pointer;user-select:none;gap:8px}
.trace-section-header:hover{background:var(--surface2)}
.trace-section-body{padding:10px 12px;max-height:500px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.trace-section.collapsed .trace-section-body{display:none}
.trace-section.collapsed .trace-section-header .sec-arrow{transform:rotate(-90deg)}
.sec-arrow{font-size:10px;color:var(--text3);transition:transform .15s}
.trace-controls{display:flex;gap:4px;margin-left:auto;align-items:center}
.md-toggle{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.md-toggle:hover{background:var(--border)}
.md-toggle.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.resp-md{line-height:1.7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:var(--text2);white-space:normal}
.resp-md h1,.resp-md h2,.resp-md h3,.resp-md h4{color:var(--text);margin:10px 0 6px}
.resp-md h1{font-size:16px}.resp-md h2{font-size:15px}.resp-md h3{font-size:14px}.resp-md h4{font-size:13px}
.resp-md p{margin:4px 0}.resp-md ul,.resp-md ol{padding-left:20px;margin:4px 0}
.resp-md li{margin:2px 0}.resp-md strong{color:var(--text)}.resp-md em{color:var(--text2)}
.resp-md code{background:var(--border);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px}
.resp-md hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.resp-raw{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.copy-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--text3);font-size:12px;cursor:pointer;line-height:1}
.copy-btn:hover{color:var(--text);background:var(--border)}
/* Consensus bar */
.consensus-bar{margin-bottom:16px;background:var(--surface2);border-radius:8px;padding:14px 16px}
.consensus-labels{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.consensus-label{display:flex;align-items:center;gap:4px}
.consensus-dot{width:8px;height:8px;border-radius:2px}
.consensus-track{display:flex;height:24px;border-radius:6px;overflow:hidden;gap:2px}
.consensus-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.9);min-width:0;transition:flex .3s}
.consensus-seg.seg-bull{background:var(--green)}
.consensus-seg.seg-neutral{background:var(--yellow);color:var(--bg)}
.consensus-seg.seg-bear{background:var(--red)}
.consensus-final{margin-top:8px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
/* Gantt */
.gantt-container{display:flex;flex-direction:column;gap:3px;margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:8px}
.gantt-row{display:flex;align-items:center;height:22px}
.gantt-label{width:130px;font-size:11px;color:var(--text2);text-align:right;padding-right:8px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-track{flex:1;height:14px;position:relative;border-radius:3px}
.gantt-bg{position:absolute;left:0;right:0;top:0;height:100%;background:var(--border);border-radius:3px;opacity:.15}
.gantt-bar{position:absolute;height:100%;border-radius:3px;min-width:3px;cursor:pointer;opacity:.85;transition:opacity .15s}
.gantt-bar:hover{opacity:1}
.gantt-time{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;padding-left:138px}
.gantt-tooltip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;font-size:10px;color:var(--text2);white-space:nowrap;pointer-events:none;display:none;z-index:10}
.gantt-bar:hover .gantt-tooltip{display:block}
/* Kline chart */
.kline-section{margin-bottom:12px}
.kline-chart{width:100%;height:400px;border-radius:8px;overflow:hidden;background:var(--surface2)}
.kline-indicators{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.kline-indicator-box{background:var(--surface2);border-radius:8px;padding:12px}
.kline-indicator-box h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.kline-indicator-box .md-content{font-size:12px;max-height:200px;overflow-y:auto;line-height:1.6}
/* News timeline */
.news-timeline{margin-bottom:16px}
.news-date{margin-bottom:12px}
.news-date-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.news-card{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.news-time{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:50px;padding-top:2px}
.news-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.news-content{font-size:12px;color:var(--text2);line-height:1.5}
.news-source{font-size:10px;color:var(--text3);margin-top:4px}
.news-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.news-stat{background:var(--surface2);padding:4px 10px;border-radius:4px;font-size:11px;color:var(--text2)}
/* Enhanced debate */
.debate-round{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:12px}
.debate-round h4{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);display:flex;align-items:center;gap:8px}
.debate-round h4 .round-num{background:var(--border);padding:2px 8px;border-radius:4px;font-size:11px;color:var(--text2)}
.debate-row{display:flex;gap:10px}
.debate-side{flex:1;border-radius:8px;padding:12px;font-size:12px;line-height:1.6}
.debate-bull{background:#4ade8010;border:1px solid #4ade8030}
.debate-bear{background:#f8717110;border:1px solid #f8717130}
.debate-side .side-label{font-weight:700;font-size:12px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.1)}
.debate-claim{margin-bottom:8px;padding:6px 8px;border-radius:4px;background:rgba(0,0,0,.15)}
.debate-claim .claim-topic{font-weight:600;color:var(--text);font-size:12px;margin-bottom:2px}
.debate-claim .claim-evidence{color:var(--text2);font-size:11px;line-height:1.5}
.debate-verdict{margin-top:8px;padding:4px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)}
/* Price level chart */
.price-level{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:12px}
.price-level h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.price-level-chart{position:relative;height:180px;display:flex;flex-direction:column;justify-content:center;gap:0}
.price-axis{position:absolute;right:0;top:0;bottom:0;width:60px;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono);text-align:right;padding-right:4px}
.pl-line{position:relative;height:36px;border-radius:6px;display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:600;transition:transform .15s}
.pl-line:hover{transform:scale(1.02)}
.pl-line .pl-label{flex:1}
.pl-line .pl-val{font-family:var(--mono);font-size:13px}
.pl-line.pl-stop{background:var(--red20);color:var(--red);border:1px solid var(--red)}
.pl-line.pl-entry{background:var(--blue20);color:var(--blue);border:1px solid var(--blue)}
.pl-line.pl-target{background:var(--green20);color:var(--green);border:1px solid var(--green)}
.pl-line.pl-current{background:var(--surface);color:var(--text);border:2px solid var(--border2)}
.pl-range{position:relative;margin:4px 0;height:120px;border-left:3px solid var(--border);margin-left:30px}
.pl-range-label{position:absolute;left:-34px;font-size:9px;color:var(--text3);font-family:var(--mono);transform:translateY(-50%)}
.pl-range-bar{position:absolute;left:0;right:0;border-radius:2px;min-height:3px}
/* Risk radar */
.risk-radar{background:var(--surface2);border-radius:8px;padding:14px}
.risk-radar h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.risk-gauge{position:relative;width:200px;height:100px;margin:0 auto 12px}
.risk-gauge-bg{fill:none;stroke:var(--border);stroke-width:12}
.risk-gauge-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.risk-gauge-label{text-anchor:middle;font-size:24px;font-weight:700}
.risk-gauge-sub{text-anchor:middle;font-size:11px;fill:var(--text3)}
.risk-items{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.risk-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.risk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* Fundamentals table */
.fund-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.fund-table th{text-align:left;padding:6px 10px;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border);font-weight:600}
.fund-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.fund-table tr:hover td{background:var(--surface)}
.fund-table .metric-name{color:var(--text);font-weight:500}
.fund-table .metric-val{font-family:var(--mono);text-align:right;color:var(--text)}
.fund-table .metric-change{text-align:right;font-size:11px}
.fund-section{margin-bottom:12px}
.fund-section h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;padding:4px 0;border-bottom:1px solid var(--border)}
/* Fund flow bars */
.fund-flow{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:12px}
.fund-flow h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.ff-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ff-label{width:80px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0}
.ff-track{flex:1;height:16px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.ff-bar{height:100%;border-radius:4px;transition:width .5s ease;min-width:2px}
.ff-bar.ff-in{background:var(--green)}
.ff-bar.ff-out{background:var(--red);float:right}
.ff-val{width:70px;font-size:11px;color:var(--text2);font-family:var(--mono);flex-shrink:0}
.ff-legend{display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text3)}
.ff-legend span{display:flex;align-items:center;gap:4px}
.ff-legend-dot{width:8px;height:8px;border-radius:2px}
/* Sentiment gauge */
.sentiment-gauge{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:12px}
.sentiment-gauge h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.sg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sg-label{width:80px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0}
.sg-track{flex:1;height:12px;background:var(--border);border-radius:6px;overflow:hidden}
.sg-fill{height:100%;border-radius:6px;transition:width .5s}
.sg-val{width:40px;font-size:11px;font-family:var(--mono);color:var(--text2);flex-shrink:0;text-align:right}
.sg-summary{display:flex;align-items:center;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.sg-score{font-size:28px;font-weight:700;min-width:50px;text-align:center}
.sg-desc{font-size:12px;color:var(--text2);line-height:1.5}
/* Cost breakdown */
.cost-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.cost-card{background:var(--surface2);border-radius:8px;padding:12px;text-align:center}
.cost-card .cc-val{font-size:18px;font-weight:700;color:var(--text)}
.cost-card .cc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
/* Phase bars */
.phase-bars{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:16px}
.phase-bars h5{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.pb-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pb-label{width:80px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0}
.pb-track{flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden;display:flex}
.pb-seg{height:100%;transition:width .3s;min-width:2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:rgba(255,255,255,.8);overflow:hidden;white-space:nowrap}
.pb-val{width:60px;font-size:11px;font-family:var(--mono);color:var(--text2);flex-shrink:0;text-align:right}
/* Responsive */
@media(max-width:768px){.header{flex-direction:column;gap:12px}.plan-grid{grid-template-columns:1fr}.analyst-grid{grid-template-columns:1fr}.debate-row{flex-direction:column}.cost-overview{grid-template-columns:1fr}.risk-items{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1 data-i18n="title">OpenClaw Trading Agents <span>Dashboard</span></h1>
  <div class="filters">
    <input type="text" id="search" data-i18n-placeholder="searchPlaceholder" />
    <select id="mode-filter">
      <option value="" data-i18n="allModes"></option>
      <option value="quick">Quick</option>
      <option value="full">Full</option>
    </select>
    <button id="lang-toggle" style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text2);font-size:13px;cursor:pointer" title="Switch language"></button>
  </div>
</div>

<div class="main">
  <table id="report-table">
    <thead>
      <tr>
        <th data-i18n="thTicker"></th>
        <th data-i18n="thDate"></th>
        <th data-i18n="thMode"></th>
        <th data-i18n="thDirection"></th>
        <th data-i18n="thConfidence"></th>
        <th data-i18n="thAnalysts"></th>
        <th data-i18n="thCost"></th>
        <th data-i18n="thDuration"></th>
        <th data-i18n="thRisk"></th>
      </tr>
    </thead>
    <tbody id="report-tbody"></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display:none"></div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="analysts" data-i18n="tabAnalysts"></div>
      <div class="tab" data-tab="detail" data-i18n="tabDetail"></div>
      <div class="tab" data-tab="data" data-i18n="tabData"></div>
      <div class="tab" data-tab="traces" data-i18n="tabTraces"></div>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="panel-analysts"></div>
      <div class="tab-panel" id="panel-detail"></div>
      <div class="tab-panel" id="panel-data"></div>
      <div class="tab-panel" id="panel-traces"></div>
    </div>
  </div>
</div>

<script>
// ── i18n ──
const I18N = {
  zh: {
    title: 'OpenClaw Trading Agents <span>控制台</span>',
    searchPlaceholder: '搜索股票代码...',
    allModes: '全部模式',
    thTicker: '股票代码', thDate: '日期', thMode: '模式', thDirection: '方向',
    thConfidence: '信心度', thAnalysts: '分析师', thCost: '费用', thDuration: '耗时', thRisk: '风控',
    tabAnalysts: '分析师', tabDetail: '详情', tabData: '数据源', tabTraces: '调用追踪',
    labelDate: '日期', labelDirection: '方向', labelConfidence: '信心度',
    labelTokens: 'Token', labelCost: '费用', labelDuration: '耗时', labelMode: '模式',
    loading: '加载中...', empty: '暂无报告，请先运行分析。',
    loadFailed: '加载失败：',
    noDetail: '暂无详情数据。',
    noData: '暂无原始数据。',
    noTraces: '暂无调用追踪数据。',
    researchDecision: '研究决策', bull: '多头', bear: '空头',
    tradingPlan: '交易计划', riskAssessment: '风控评估',
    target: '目标价', stop: '止损价', position: '仓位', direction: '方向',
    entry: '入场信号', exit: '退出信号', risks: '风险提示',
    score: '评分', status: '状态', debate: '辩论', round: '第{n}轮',
    qualityGate: '数据质量门控', credibility: '可信度',
    hardConstraints: '硬约束', softConstraints: '软建议', preconditions: '进场前提', deRiskTriggers: '降风险触发',
    retriesExhausted: '重试耗尽', invalidations: '失效条件',
    provenance: '决策溯源',
    staleReports: '陈旧', fabricationSuspects: '可疑捏造',
    systemPrompt: '系统提示', response: '模型回复',
    errorPrefix: '错误：',
    roleNames: { market:'技术面', fundamentals:'基本面', news:'新闻', sentiment:'情绪', policy:'政策', hot_money:'资金流', lockup:'解禁' },
    phaseNames: { analyst:'分析师', portfolio:'组合经理', debate:'辩论', research:'研究', trader:'交易', risk_debate:'风控辩论', risk:'风控' },
  },
  en: {
    title: 'OpenClaw Trading Agents <span>Dashboard</span>',
    searchPlaceholder: 'Search ticker...',
    allModes: 'All modes',
    thTicker: 'Ticker', thDate: 'Date', thMode: 'Mode', thDirection: 'Direction',
    thConfidence: 'Confidence', thAnalysts: 'Analysts', thCost: 'Cost', thDuration: 'Duration', thRisk: 'Risk',
    tabAnalysts: 'Analysts', tabDetail: 'Detail', tabData: 'Raw Data', tabTraces: 'Traces',
    labelDate: 'Date', labelDirection: 'Direction', labelConfidence: 'Confidence',
    labelTokens: 'Tokens', labelCost: 'Cost', labelDuration: 'Duration', labelMode: 'Mode',
    loading: 'Loading...', empty: 'No reports found. Run an analysis first.',
    loadFailed: 'Failed to load reports: ',
    noDetail: 'No detail data available.',
    noData: 'No raw data available.',
    noTraces: 'No traces available.',
    researchDecision: 'Research Decision', bull: 'Bull', bear: 'Bear',
    tradingPlan: 'Trading Plan', riskAssessment: 'Risk Assessment',
    target: 'Target', stop: 'Stop', position: 'Position', direction: 'Direction',
    entry: 'Entry', exit: 'Exit', risks: 'Risks',
    score: 'Score', status: 'Status', debate: 'Debate', round: 'Round {n}',
    qualityGate: 'Quality Gate', credibility: 'Credibility',
    hardConstraints: 'Hard Constraints', softConstraints: 'Soft', preconditions: 'Preconditions', deRiskTriggers: 'De-risk Triggers',
    retriesExhausted: 'Retries Exhausted', invalidations: 'Invalidations',
    provenance: 'Decision Provenance',
    staleReports: 'Stale', fabricationSuspects: 'Fabrication Suspects',
    systemPrompt: 'System prompt', response: 'Response',
    errorPrefix: 'Error: ',
    roleNames: { market:'Market', fundamentals:'Fundamentals', news:'News', sentiment:'Sentiment', policy:'Policy', hot_money:'Hot Money', lockup:'Lockup' },
    phaseNames: { analyst:'Analyst', portfolio:'Portfolio', debate:'Debate', research:'Research', trader:'Trader', risk_debate:'Risk Debate', risk:'Risk' },
  }
};

let lang = localStorage.getItem('dashboard-lang') || 'zh';
function t(key) { return I18N[lang]?.[key] ?? I18N.en[key] ?? key; }
function roleName(role) { return I18N[lang]?.roleNames?.[role] || capitalize(role); }
function phaseName(phase) { return I18N[lang]?.phaseNames?.[phase] || phase; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (key === 'title') { el.innerHTML = t(key); return; }
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  const btn = document.getElementById('lang-toggle');
  btn.textContent = lang === 'zh' ? 'EN' : '中文';
  document.title = lang === 'zh' ? 'OpenClaw Trading Agents — 控制台' : 'OpenClaw Trading Agents — Dashboard';
}

// ── State ──
let reports = [];
let currentReport = null;
let currentTraces = [];

// ── Init ──
(async function init() {
  applyI18n();
  document.getElementById('lang-toggle').addEventListener('click', () => {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('dashboard-lang', lang);
    applyI18n();
    renderTable();
    if (currentReport) openModal(currentReport.id);
  });

  try {
    const res = await fetch('/api/reports');
    reports = await res.json();
    renderTable();
  } catch (e) {
    const em = document.getElementById('empty-msg');
    em.style.display = 'block';
    em.textContent = t('loadFailed') + e.message;
  }

  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('mode-filter').addEventListener('change', renderTable);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });
})();

// ── Render table ──
function renderTable() {
  const search = document.getElementById('search').value.trim().toLowerCase();
  const modeFilter = document.getElementById('mode-filter').value;
  const tbody = document.getElementById('report-tbody');
  const empty = document.getElementById('empty-msg');

  let filtered = reports;
  if (search) filtered = filtered.filter(r => r.ticker.includes(search) || r.company_name.toLowerCase().includes(search));
  if (modeFilter) filtered = filtered.filter(r => r.mode === modeFilter);

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    empty.textContent = t('empty');
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const dirClass = directionClass(r.direction);
    const dots = renderDots(r.analyst_verdicts);
    const conf = (r.confidence * 100).toFixed(0);
    const confColor = r.confidence >= 0.7 ? 'var(--green)' : r.confidence >= 0.4 ? 'var(--yellow)' : 'var(--red)';
    const cost = r.total_cost_usd < 0.01 ? '<$0.01' : '$' + r.total_cost_usd.toFixed(2);
    const dur = r.duration_ms < 1000 ? r.duration_ms + 'ms' : (r.duration_ms / 1000).toFixed(1) + 's';
    const riskBadge = r.risk_assessment ? badgeHtml(r.risk_assessment, 'badge-' + r.risk_assessment) : '<span style="color:var(--text3)">—</span>';
    const riskDetail = r.risk_assessment_detail;
    const riskExtra = riskDetail ? (riskDetail.retries_exhausted ? `<span class="warn-badge">⚠ ${t('retriesExhausted')}</span>` : '') : '';
    const flagCount = (r.warnings || []).length + (r.cross_stage_issues || []).length;
    const flagErrs = (r.warnings || []).filter(w => w.severity === 'error').length + (r.cross_stage_issues || []).filter(i => i.severity === 'error').length;
    const flagBadge = flagCount ? `<span class="warn-badge" title="${flagCount} 条 review 告警${flagErrs ? `（${flagErrs} error）` : ''}">⚠ ${flagCount}</span>` : '';

    return `<tr data-id="${r.id}">
      <td style="font-weight:500">${r.ticker}<br><span style="color:var(--text3);font-size:11px;font-weight:400">${r.company_name || ''}</span></td>
      <td style="color:var(--text2)">${r.date}</td>
      <td>${badgeHtml(r.mode, 'badge-' + r.mode)}</td>
      <td>${badgeHtml(r.direction, dirClass)}</td>
      <td><div class="conf-bar"><div class="conf-track"><div class="conf-fill" style="width:${conf}%;background:${confColor}"></div></div><span class="conf-val">${conf}%</span></div></td>
      <td>${dots}</td>
      <td style="color:var(--text2);font-size:12px">${cost}</td>
      <td style="color:var(--text2);font-size:12px">${dur}</td>
      <td>${riskBadge}${riskExtra}${flagBadge}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => openModal(tr.dataset.id));
  });
}

function renderDots(verdicts) {
  const order = ['market','fundamentals','news','sentiment','policy','hot_money','lockup'];
  if (!verdicts || Object.keys(verdicts).length === 0) return '<span style="color:var(--text3)">—</span>';
  return '<div class="analyst-dots">' + order.filter(r => verdicts[r]).map(role => {
    const dir = verdicts[role].direction || '中性';
    const color = dir.includes('看多') || dir === 'Buy' || dir === 'Overweight' ? 'var(--green)' : dir.includes('看空') || dir === 'Sell' || dir === 'Underweight' ? 'var(--red)' : 'var(--yellow)';
    return `<div class="analyst-dot" style="background:${color}" title="${roleName(role)}: ${dir}"></div>`;
  }).join('') + '</div>';
}

function badgeHtml(text, cls) {
  return `<span class="badge ${cls}">${text}</span>`;
}

function directionClass(dir) {
  if (!dir) return 'badge-hold';
  const d = dir.toLowerCase();
  if (d === 'buy' || d === 'overweight' || d === 'strong buy') return 'badge-buy';
  if (d === 'sell' || d === 'underweight' || d === 'strong sell') return 'badge-sell';
  return 'badge-hold';
}

// ── Modal ──
async function openModal(id) {
  const report = reports.find(r => r.id === id);
  if (!report) return;

  currentReport = report;
  document.getElementById('modal').classList.add('active');

  document.getElementById('modal-title').innerHTML =
    `${report.ticker} <span class="company">${report.company_name}</span>`;

  const dirCls = directionClass(report.direction);
  const conf = (report.confidence * 100).toFixed(0);
  const cost = report.total_cost_usd < 0.01 ? '<$0.01' : '$' + report.total_cost_usd.toFixed(2);
  const dur = report.duration_ms < 1000 ? report.duration_ms + 'ms' : (report.duration_ms / 1000).toFixed(1) + 's';
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item"><span class="label">${t('labelDate')}</span><span class="value">${report.date}</span></div>
    <div class="summary-item"><span class="label">${t('labelDirection')}</span><span class="value">${badgeHtml(report.direction, dirCls)}</span></div>
    <div class="summary-item"><span class="label">${t('labelConfidence')}</span><span class="value">${conf}%</span></div>
    <div class="summary-item"><span class="label">${t('labelTokens')}</span><span class="value">${report.total_tokens.toLocaleString()}</span></div>
    <div class="summary-item"><span class="label">${t('labelCost')}</span><span class="value">${cost}</span></div>
    <div class="summary-item"><span class="label">${t('labelDuration')}</span><span class="value">${dur}</span></div>
    <div class="summary-item"><span class="label">${t('labelMode')}</span><span class="value">${badgeHtml(report.mode, 'badge-' + report.mode)}</span></div>
  `;

  const detailTab = document.querySelector('.tab[data-tab="detail"]');
  detailTab.style.display = report.mode === 'full' ? '' : 'none';

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[data-tab="analysts"]').classList.add('active');
  document.getElementById('panel-analysts').classList.add('active');

  loadAnalysts(report);
  if (report.mode === 'full') loadFullDetail(report);
  loadDataSources(report);
  loadTraces(report);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  currentReport = null;
  currentTraces = [];
}

// ── Extract first meaningful paragraph from analyst content ──
function extractSummary(content) {
  if (!content) return '';
  // Remove markdown headers, take first non-empty paragraph
  const lines = content.split('\n');
  let summary = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('---') || trimmed.startsWith('<!--')) continue;
    // Found first content line
    summary = trimmed.replace(/\*\*/g, '').replace(/\*/g, '').replace(/`/g, '');
    if (summary.length > 120) summary = summary.slice(0, 120) + '…';
    break;
  }
  return summary;
}

// ── Analyst consensus bar ──
function renderConsensusBar(analysts) {
  let bull = 0, bear = 0, neutral = 0;
  for (const a of analysts) {
    const d = (a.verdict?.direction || '中性');
    if (d.includes('看多') || d === 'Buy' || d === 'Overweight' || d === 'Strong Buy') bull++;
    else if (d.includes('看空') || d === 'Sell' || d === 'Underweight' || d === 'Strong Sell') bear++;
    else neutral++;
  }
  const total = bull + bear + neutral || 1;
  const bullPct = (bull / total * 100).toFixed(0);
  const bearPct = (bear / total * 100).toFixed(0);
  const neutralPct = (neutral / total * 100).toFixed(0);
  const bullLabel = lang === 'zh' ? '看多' : 'Bull';
  const neutralLabel = lang === 'zh' ? '中性' : 'Neutral';
  const bearLabel = lang === 'zh' ? '看空' : 'Bear';
  return `
    <div class="consensus-bar">
      <div class="consensus-labels">
        <span class="consensus-label"><span class="consensus-dot" style="background:var(--green)"></span>${bullLabel} ${bull}</span>
        <span class="consensus-label"><span class="consensus-dot" style="background:var(--yellow)"></span>${neutralLabel} ${neutral}</span>
        <span class="consensus-label"><span class="consensus-dot" style="background:var(--red)"></span>${bearLabel} ${bear}</span>
      </div>
      <div class="consensus-track">
        ${bull > 0 ? `<div class="consensus-seg seg-bull" style="flex:${bull}">${bullPct}%</div>` : ''}
        ${neutral > 0 ? `<div class="consensus-seg seg-neutral" style="flex:${neutral}">${neutralPct}%</div>` : ''}
        ${bear > 0 ? `<div class="consensus-seg seg-bear" style="flex:${bear}">${bearPct}%</div>` : ''}
      </div>
    </div>`;
}

/** Render the cross-run source health card (data source health tracker).
 *  Reads from /api/source-health → returns the global _source-health.json
 *  state. Ticker-agnostic — surfaces per-source success rate trends. */
function renderSourceHealthCard(state) {
  if (!state || !state.sources || Object.keys(state.sources).length === 0) {
    return `
      <section class="card" style="margin-bottom:16px;">
        <h3>📊 数据源健康（跨 run）</h3>
        <p style="color:var(--text3)">暂无数据。运行 trading_quick/full 后再来看。
          CLI: <code>npm run source-health</code></p>
      </section>
    `;
  }

  const rows = Object.entries(state.sources)
    .sort(([an, a], [bn, b]) => {
      const af = a.stats.success_rate < 1 ? 0 : 1;
      const bf = b.stats.success_rate < 1 ? 0 : 1;
      if (af !== bf) return af - bf;
      return a.stats.success_rate - b.stats.success_rate;
    })
    .map(([name, entry]) => {
      const s = entry.stats;
      const failing = s.success_rate < 1;
      const color = failing ? '#c0392b' : '#16a085';
      const indicator = failing ? '! ' : '✓ ';
      const rate = (s.success_rate * 100).toFixed(0);
      const succ = `${s.total_success}/${s.total_calls}`;
      const lastErr = (s.last_error || '-').slice(0, 25);
      const lastTs = s.last_success_ts ?? s.last_error_ts;
      const lastCall = lastTs
        ? new Date(lastTs).toLocaleString('zh-CN', {hour12: false})
        : '(never)';
      return `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:4px 8px;color:${color}">${indicator}${name}</td>
          <td style="padding:4px 8px;font-family:monospace;text-align:right">${succ} (${rate}%)</td>
          <td style="padding:4px 8px;color:var(--text3);max-width:200px;overflow:hidden;text-overflow:ellipsis">${lastErr}</td>
          <td style="padding:4px 8px;color:var(--text3);font-size:0.85em">${lastCall}</td>
        </tr>
      `;
    })
    .join('');

  return `
    <section class="card" style="margin-bottom:16px;">
      <h3>📊 数据源健康（跨 run，最近 20 次/source）
        <span style="font-size:0.75em;color:var(--text3);font-weight:normal">— 更新: ${state.updated_at || '(never)'} | CLI: <code>npm run source-health</code></span>
      </h3>
      <table style="width:100%;border-collapse:collapse;font-size:0.9em;">
        <thead>
          <tr style="text-align:left;border-bottom:2px solid var(--border);color:var(--text2)">
            <th style="padding:6px 8px">Source</th>
            <th style="padding:6px 8px;text-align:right">Success</th>
            <th style="padding:6px 8px">Last Error</th>
            <th style="padding:6px 8px">Last Call</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </section>
  `;
}

async function loadDebateRounds(ticker, detailPath) {
  const rounds = [];
  for (let i = 1; i <= 4; i++) {
    const data = await fetchJson(`/api/detail/${ticker}/${detailPath}/02_debate/round_${i}.json`);
    if (data) rounds.push(data);

// ── Gantt chart for LLM calls ──
function renderGanttChart(traces) {
  if (traces.length < 2) return '';
  const items = traces.map(tr => {
    const ts = tr.meta?.timestamp;
    const dur = tr.meta?.duration_ms || 0;
    if (!ts) return null;
    return { ...tr, tsMs: new Date(ts).getTime(), dur };
  }).filter(Boolean);
  if (items.length < 2) return '';

  const minT = Math.min(...items.map(i => i.tsMs));
  const lastEnd = Math.max(...items.map(i => i.tsMs + i.dur));
  const span = lastEnd - minT || 1;

  const rows = items.map(tr => {
    const left = ((tr.tsMs - minT) / span * 100).toFixed(2);
    const width = Math.max((tr.dur / span * 100), 0.5).toFixed(2);
    const phase = tr.phase || '';
    const c = phaseColors[phase] || ['var(--border2)','var(--text2)'];
    const label = (tr.role ? roleName(tr.role) : phaseName(phase));
    const dur = tr.dur > 0 ? (tr.dur / 1000).toFixed(1) + 's' : '—';
    const tokens = tr.meta?.usage?.total_tokens || 0;
    return `
      <div class="gantt-row">
        <div class="gantt-label">${label}</div>
        <div class="gantt-track">
          <div class="gantt-bg"></div>
          <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${c[1]}">
            <div class="gantt-tooltip">${label} · ${dur} · ${tokens.toLocaleString()} tokens</div>
          </div>
        </div>
      </div>`;
  }).join('');

  const startSec = '0s';
  const totalSec = (span / 1000).toFixed(1) + 's';
  return `
    <div class="gantt-container">
      ${rows}
      <div class="gantt-time"><span>${startSec}</span><span>${totalSec}</span></div>
    </div>`;
}

        } else {
          detail.style.display = 'none';
        }
      });
    });

  } catch (e) {
    panel.innerHTML = `<div style="color:var(--red)">${t('errorPrefix')}${e.message}</div>`;
  }
}

// ── Raw Data panel ──
async function loadDataSources(report) {
  const panel = document.getElementById('panel-data');
  panel.innerHTML = `<div style="color:var(--text3)">${t('loading')}</div>`;

  const dateMode = report.id;
  const [ticker, ...rest] = dateMode.split('_');
  const mode = rest.pop();
  const date = rest.join('_');
  const detailPath = `${date}_${mode}`;

  try {
    const res = await fetch(`/api/data/${ticker}/${detailPath}`);
    const dataSources = await res.json();

    if (!dataSources || dataSources.length === 0) {
      panel.innerHTML = `<div style="color:var(--text3)">${t('noData')}</div>`;
      return;
    }

    panel.innerHTML = `
      <div class="analyst-grid">
        ${dataSources.map(ds => {
          const statusIcon = ds.success ? '✅' : '❌';
          const summary = ds.success ? summarizeData(ds.role, ds.data) : '';
          const source = ds._source ? ` · ${ds._source}` : '';
          return `<div class="analyst-card" data-role="${ds.role}" style="cursor:pointer">
            <div class="card-head">
              <span class="role">${statusIcon} ${roleName(ds.role)}</span>
              ${summary || ds.error ? `<span class="badge" style="background:var(--surface2);color:${ds.success ? 'var(--text2)' : 'var(--red)'}">${ds.success ? summary + source : escapeHtml(ds.error || 'Error')}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="analyst-expanded" id="data-expanded">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <h4 id="data-expanded-title" style="margin:0"></h4>
          <div class="jt-controls">
            <button onclick="expandAllTree(document.getElementById('data-tree'))">${lang === 'zh' ? '展开全部' : 'Expand All'}</button>
            <button onclick="collapseAllTree(document.getElementById('data-tree'))">${lang === 'zh' ? '折叠全部' : 'Collapse All'}</button>
            <button onclick="copyContent(this,'data-tree')">${'📋 ' + (lang === 'zh' ? '复制' : 'Copy')}</button>
          </div>
        </div>
        <div id="data-viz"></div>
        <div class="jt-root" id="data-tree" style="display:block;max-height:600px;overflow-y:auto;margin-top:12px"></div>
      </div>
    `;

    panel.querySelectorAll('.analyst-card').forEach(card => {
      card.addEventListener('click', () => {
        const role = card.dataset.role;
        const ds = dataSources.find(d => d.role === role);
        if (!ds) return;
        // Clean up previous chart
        if (klineChartInstance) {
          klineChartInstance.ro?.disconnect();
          klineChartInstance.chart?.remove();
          klineChartInstance = null;
        }
        const expanded = document.getElementById('data-expanded');
        document.getElementById('data-expanded-title').textContent = roleName(role);
        // Render role-specific visualization
        const vizEl = document.getElementById('data-viz');
        let vizHtml = '';
        if (role === 'market') vizHtml = renderKlineSection(ds);
        else if (role === 'news') vizHtml = renderNewsTimeline(ds);
        else if (role === 'fundamentals') vizHtml = renderFundamentalsTable(ds);
        else if (role === 'hot_money') vizHtml = renderFundFlow(ds);
        else if (role === 'sentiment') vizHtml = renderSentimentGauge(ds);
        vizEl.innerHTML = vizHtml;
        document.getElementById('data-tree').innerHTML = renderJsonTree(ds);
        expanded.classList.toggle('show');
      });
    });
  } catch (e) {
    panel.innerHTML = `<div style="color:var(--red)">${t('errorPrefix')}${e.message}</div>`;
  }
}

// ── Helpers ──
async function fetchJson(url) {
  try {
    const res = await fetch(url);
    return res.ok ? await res.json() : null;
  } catch { return null; }
}

function capitalize(s) {
  if (!s) return '';
  return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function formatNum(n) {
  if (n == null) return '—';
  return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

// ── Price level visualization ──
function renderPriceLevels(trading) {
  const target = trading.target_price;
  const stop = trading.stop_loss;
  const entry = trading.entry_price || (target && stop ? Math.round((target + stop) / 2) : null);
  if (!target && !stop) return '';

  const prices = [
    { label: lang === 'zh' ? '止损价' : 'Stop Loss', val: stop, cls: 'pl-stop' },
    { label: lang === 'zh' ? '入场价' : 'Entry', val: entry, cls: 'pl-entry' },
    { label: lang === 'zh' ? '目标价' : 'Target', val: target, cls: 'pl-target' },
  ].filter(p => p.val);

  if (prices.length < 2) return '';

  const allVals = prices.map(p => p.val);
  const minP = Math.min(...allVals);
  const maxP = Math.max(...allVals);
  const range = maxP - minP || 1;

  return `
    <div class="price-level" style="margin-top:12px">
      <h5>${lang === 'zh' ? '价格区间' : 'Price Levels'}</h5>
      <div class="price-level-chart">
        ${prices.map(p => {
          const pct = ((p.val - minP) / range * 100);
          const ml = Math.max(pct - 12, 0);
          const w = Math.min(100 - ml, 40);
          return `<div class="pl-line ${p.cls}" style="margin-left:${ml.toFixed(0)}%;width:${w.toFixed(0)}%">
            <span class="pl-label">${p.label}</span>
            <span class="pl-val">¥${formatNum(p.val)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ── Quality gate card (review gap #3) ──
function gradeClass(grade) {
  const g = (grade || '').toUpperCase();
  return ['A','B','C','D','F'].includes(g) ? `g-${g.toLowerCase()}` : 'g-f';
}
function credClass(cred) {
  if (cred === '高' || cred === 'high') return 'cred-high';
  if (cred === '中' || cred === 'mid' || cred === 'medium') return 'cred-mid';
  if (cred === '低' || cred === 'low') return 'cred-low';
  return 'cred-mid';
}
function renderReviewFlags(report) {
  if (!report) return '';
  const issues = report.cross_stage_issues || [];
  const warns = report.warnings || [];
  if (!issues.length && !warns.length) return '';
  let html = '<div class="review-flags">';
  const rows = [];
  // Cross-stage anomalies first (structural), then per-step fallback warnings.
  for (const i of issues) {
    rows.push(`<li><span class="${i.severity === 'error' ? 'flag-err' : 'flag-warn'}">${i.severity === 'error' ? '⛔' : '⚠'}</span><b>${escapeHtml(i.check)}</b>：${escapeHtml(i.message)}</li>`);
  }
  for (const w of warns) {
    rows.push(`<li><span class="${w.severity === 'error' ? 'flag-err' : 'flag-warn'}">${w.severity === 'error' ? '⛔' : '⚠'}</span><b>${escapeHtml(w.phase)}.${escapeHtml(w.fn)}</b>：${escapeHtml(w.detail)}</li>`);
  }
  const errs = issues.filter(i => i.severity === 'error').length + warns.filter(w => w.severity === 'error').length;
  html += `<h4 style="color:var(--red);margin:0 0 8px">⚠ Review 告警（${rows.length}${errs ? `，含 ${errs} 个 error` : ''}）</h4><ul class="flag-list">${rows.join('')}</ul>`;

  // Pipeline health issues
  const ph = report.pipeline_health || [];
  if (ph.length > 0) {
    const aborts = ph.filter(i => i.severity === "abort");
    const skips = ph.filter(i => i.severity === "skip");
    const phWarns = ph.filter(i => i.severity === "warn");
    html += `<div class="flag-section"><strong>管道健康</strong> `;
    if (aborts.length) html += `<span class="flag-err">${aborts.length} 中止</span> `;
    if (skips.length) html += `<span style="color:#e67e22">${skips.length} 跳过</span> `;
    if (phWarns.length) html += `<span class="flag-warn">${phWarns.length} 警告</span>`;
    html += `</div>`;
    for (const i of ph) {
      const cls = i.severity === "abort" ? "flag-err" : i.severity === "skip" ? "" : "flag-warn";
      html += `<div class="flag-item ${cls}">[${i.severity}] ${i.stage}.${i.check}: ${escapeHtml(i.message)}</div>`;
    }
  }

  html += '</div>';
  return html;
}
function renderQualityGate(quality) {
  const layer1 = quality.layer1;
  const layer2 = quality.layer2;
  if (!layer1) return '';
  const grades = layer1.grades || [];
  const gradeBadges = grades.map(g => {
    const role = roleName(g.role);
    return `<span class="quality-grade"><span class="grade-badge ${gradeClass(g.grade)}">${escapeHtml((g.grade || '?').toUpperCase())}</span>${escapeHtml(role)}</span>`;
  }).join('');

  let layer2Html = '';
  if (layer2) {
    const chips = [];
    if (layer2.credibility) {
      chips.push(`<span class="cred-badge ${credClass(layer2.credibility)}">${t('credibility')}: ${escapeHtml(layer2.credibility)}</span>`);
    }
    (layer2.stale_reports || []).forEach(r => {
      chips.push(`<span class="quality-chip chip-stale">${t('staleReports')}: ${escapeHtml(roleName(r))}</span>`);
    });
    (layer2.fabrication_suspects || []).forEach(r => {
      chips.push(`<span class="quality-chip chip-warn">${t('fabricationSuspects')}: ${escapeHtml(roleName(r))}</span>`);
    });
    if (layer2.note) {
      chips.push(`<span style="color:var(--text3);font-size:11px">${escapeHtml(layer2.note)}</span>`);
    }
    layer2Html = `<div class="quality-layer2">${chips.join('')}</div>`;
  }

  return `
    <div class="quality-card">
      <h4>📊 ${t('qualityGate')}</h4>
      <div class="quality-grades">${gradeBadges}</div>
      ${layer2Html}
    </div>
  `;
}

// ── Risk judge constraints (review gap #3) ──
function renderJudgeConstraints(judge) {
  const groups = [
    { key: 'hard_constraints', label: t('hardConstraints'), cls: 'constraint-hard' },
    { key: 'soft_constraints', label: t('softConstraints'), cls: '' },
    { key: 'execution_preconditions', label: t('preconditions'), cls: '' },
    { key: 'de_risk_triggers', label: t('deRiskTriggers'), cls: 'constraint-derisk' },
  ];
  let html = '<div class="judge-constraints">';
  for (const g of groups) {
    const items = judge[g.key] || [];
    if (!items.length) continue;
    const lis = items.map(i => `<li>${escapeHtml(i)}</li>`).join('');
    html += `<div class="constraint-group ${g.cls}"><span class="constraint-label">${g.label}</span><ul>${lis}</ul></div>`;
  }
  html += '</div>';
  return html;
}

function renderRiskGauge(riskMgr) {
  const score = riskMgr.risk_score || 0;
  const status = riskMgr.status || '';
  // Color by score: 0-30 green, 31-60 yellow, 61-100 red
  let color = 'var(--green)';
  if (score > 60) color = 'var(--red)';
  else if (score > 30) color = 'var(--yellow)';

  const statusLabel = status === 'pass' ? (lang === 'zh' ? '通过' : 'PASS') :
    status === 'reject' ? (lang === 'zh' ? '拒绝' : 'REJECT') :
    status === 'revise' ? (lang === 'zh' ? '需修改' : 'REVISE') : '';

  // Semicircle gauge: radius 80, stroke 12
  const r = 80, sw = 12;
  const circumference = Math.PI * r; // half circle
  const filled = (score / 100) * circumference;

  return `
    <div class="risk-radar" style="padding:0;background:none">
      <svg width="200" height="110" viewBox="0 0 200 110" style="display:block;margin:0 auto">
        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="var(--border)" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
          stroke-dasharray="${circumference}" stroke-dashoffset="${circumference - filled}"
          style="transition:stroke-dashoffset .8s ease"/>
        <text x="100" y="80" class="risk-gauge-label" fill="${color}">${score}</text>
        <text x="100" y="100" class="risk-gauge-sub">${statusLabel}</text>
      </svg>
    </div>`;
}

/** Render the provenance chain as a horizontal pipeline (review gap #5) */
function renderProvenance(provenance) {

// ── Fundamentals table ──
function renderFundamentalsTable(ds) {
  if (!ds.success || !ds.data || typeof ds.data !== 'object') return '';
  const data = ds.data;

  // Extract key-value metrics from fundamentals data
  const sections = [];
  // Common fundamental data structures
  const metricGroups = {
    [lang === 'zh' ? '基本信息' : 'Basic']: ['ticker','name','industry','sector','total_shares','float_shares','market_cap','pe_ratio','pb_ratio','roe','eps'],
    [lang === 'zh' ? '财务指标' : 'Financials']: ['revenue','net_profit','gross_margin','net_margin','debt_ratio','current_ratio','quick_ratio','asset_turnover'],
    [lang === 'zh' ? '成长性' : 'Growth']: ['revenue_growth','profit_growth','eps_growth','roe_trend'],
  };

  let html = '<div class="fund-table-container">';
  for (const [sectionName, keys] of Object.entries(metricGroups)) {
    const found = {};
    for (const k of keys) {
      if (data[k] !== undefined) found[k] = data[k];
    }
    // Also check nested objects
    if (data.valuation) {
      for (const k of keys) { if (data.valuation[k] !== undefined) found[k] = data.valuation[k]; }
    }
    if (data.financial) {
      for (const k of keys) { if (data.financial[k] !== undefined) found[k] = data.financial[k]; }
    }
    const foundKeys = Object.keys(found);
    if (foundKeys.length === 0) continue;

    html += `<div class="fund-section"><h5>${sectionName}</h5><table class="fund-table">`;
    for (const k of foundKeys) {
      const v = found[k];
      const displayVal = typeof v === 'number' ? v.toLocaleString('zh-CN', { maximumFractionDigits: 2 }) : escapeHtml(String(v));
      html += `<tr><td class="metric-name">${escapeHtml(k)}</td><td class="metric-val">${displayVal}</td></tr>`;
    }
    html += '</table></div>';
  }

  // If no structured groups found, just show all key-value pairs
  if (html === '<div class="fund-table-container">') {
    const allKeys = Object.keys(data).filter(k => typeof data[k] !== 'object');
    if (allKeys.length > 0) {
      html += `<div class="fund-section"><h5>${lang === 'zh' ? '数据概览' : 'Overview'}</h5><table class="fund-table">`;
      for (const k of allKeys) {
        const v = data[k];
        const displayVal = typeof v === 'number' ? v.toLocaleString('zh-CN', { maximumFractionDigits: 2 }) : escapeHtml(String(v));
        html += `<tr><td class="metric-name">${escapeHtml(k)}</td><td class="metric-val">${displayVal}</td></tr>`;
      }
      html += '</table></div>';
    }
  }

  html += '</div>';
  return html === '<div class="fund-table-container"></div>' ? '' : html;
}

// ── Fund flow visualization ──
function renderFundFlow(ds) {
  if (!ds.success || !ds.data || typeof ds.data !== 'object') return '';
  const data = ds.data;

  // Look for flow data in common structures
  const flowItems = [];
  const flowKeys = ['main_net_inflow','super_large_net','large_net','medium_net','small_net',
    'north_flow','main_inflow','main_outflow','net_inflow','net_outflow'];
  for (const k of flowKeys) {
    if (data[k] !== undefined && typeof data[k] === 'number') {
      flowItems.push({ key: k, value: data[k] });
    }
  }
  // Check nested flow data
  if (data.flows && typeof data.flows === 'object') {
    for (const [k, v] of Object.entries(data.flows)) {
      if (typeof v === 'number') flowItems.push({ key: k, value: v });
    }
  }
  if (data.flow_data && typeof data.flow_data === 'object') {
    for (const [k, v] of Object.entries(data.flow_data)) {
      if (typeof v === 'number') flowItems.push({ key: k, value: v });
    }
  }

  if (flowItems.length === 0) return '';

  const maxAbs = Math.max(...flowItems.map(f => Math.abs(f.value)), 1);

  let html = `<div class="fund-flow"><h5>${lang === 'zh' ? '资金流向' : 'Fund Flow'}</h5>`;
  for (const item of flowItems) {
    const isPositive = item.value >= 0;
    const pct = (Math.abs(item.value) / maxAbs * 100).toFixed(1);
    const label = lang === 'zh' ? flowLabelZh(item.key) : item.key;
    const valStr = (isPositive ? '+' : '') + (item.value >= 100000000 ? (item.value / 100000000).toFixed(2) + '亿' : item.value >= 10000 ? (item.value / 10000).toFixed(0) + '万' : item.value.toLocaleString());
    html += `<div class="ff-row">
      <div class="ff-label">${label}</div>
      <div class="ff-track">
        <div class="ff-bar ${isPositive ? 'ff-in' : 'ff-out'}" style="width:${pct}%"></div>
      </div>
      <div class="ff-val" style="color:${isPositive ? 'var(--green)' : 'var(--red)'}">${valStr}</div>
    </div>`;
  }
  html += `<div class="ff-legend">
    <span><span class="ff-legend-dot" style="background:var(--green)"></span>${lang === 'zh' ? '流入' : 'Inflow'}</span>
    <span><span class="ff-legend-dot" style="background:var(--red)"></span>${lang === 'zh' ? '流出' : 'Outflow'}</span>
  </div></div>`;
  return html;
}

function flowLabelZh(key) {
  const map = {
    main_net_inflow: '主力净流入', super_large_net: '超大单净流入', large_net: '大单净流入',
    medium_net: '中单净流入', small_net: '小单净流入', north_flow: '北向资金',
    main_inflow: '主力流入', main_outflow: '主力流出', net_inflow: '净流入', net_outflow: '净流出'
  };
  return map[key] || key;
}

// ── Sentiment gauge ──
function renderSentimentGauge(ds) {
  if (!ds.success || !ds.data || typeof ds.data !== 'object') return '';
  const data = ds.data;

  // Look for sentiment indicators
  const indicators = [];
  const sentiKeys = ['fear_greed_index','bull_ratio','bear_ratio','neutral_ratio',
    'sentiment_score','market_breadth','advance_count','decline_count',
    'turnover_rate','volume_ratio','pe_ratio','pb_ratio'];
  for (const k of sentiKeys) {
    if (data[k] !== undefined && typeof data[k] === 'number') {
      indicators.push({ key: k, value: data[k] });
    }
  }
  // Check nested
  if (data.indicators && typeof data.indicators === 'object') {
    for (const [k, v] of Object.entries(data.indicators)) {
      if (typeof v === 'number') indicators.push({ key: k, value: v });
    }
  }
  if (data.sentiment && typeof data.sentiment === 'object') {
    for (const [k, v] of Object.entries(data.sentiment)) {
      if (typeof v === 'number') indicators.push({ key: k, value: v });
    }
  }

  if (indicators.length === 0) return '';

  // Determine overall sentiment score
  let score = data.sentiment_score || data.fear_greed_index || 50;
  score = Math.max(0, Math.min(100, score));
  const scoreLabel = score >= 70 ? (lang === 'zh' ? '贪婪' : 'Greed') :
    score >= 40 ? (lang === 'zh' ? '中性' : 'Neutral') :
    (lang === 'zh' ? '恐惧' : 'Fear');
  const scoreColor = score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--yellow)' : 'var(--red)';

  let html = `<div class="sentiment-gauge"><h5>${lang === 'zh' ? '市场情绪' : 'Market Sentiment'}</h5>`;
  for (const ind of indicators) {
    // Normalize to 0-100 for bar width
    let pct = ind.value;
    if (ind.key.includes('ratio') || ind.key.includes('Ratio')) pct = ind.value * 100;
    if (ind.key.includes('pe_') || ind.key.includes('pb_')) pct = Math.min(ind.value / 50 * 100, 100);
    pct = Math.max(0, Math.min(100, pct));
    const label = lang === 'zh' ? sentimentLabelZh(ind.key) : ind.key;
    const valStr = typeof ind.value === 'number' ? (ind.value >= 100 ? Math.round(ind.value).toLocaleString() : ind.value.toFixed(ind.value < 1 ? 2 : 1)) : ind.value;
    // Color by value range
    let barColor = 'var(--blue)';
    if (ind.key.includes('bull') || ind.key.includes('Bull') || ind.key.includes('advance')) barColor = 'var(--green)';
    if (ind.key.includes('bear') || ind.key.includes('Bear') || ind.key.includes('decline')) barColor = 'var(--red)';
    if (ind.key.includes('fear') || ind.key.includes('greed')) barColor = scoreColor;
    html += `<div class="sg-row">
      <div class="sg-label">${label}</div>
      <div class="sg-track"><div class="sg-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="sg-val">${valStr}</div>
    </div>`;
  }
  html += `<div class="sg-summary">
    <div class="sg-score" style="color:${scoreColor}">${Math.round(score)}</div>
    <div class="sg-desc">${scoreLabel}${indicators.length > 0 ? ` · ${indicators.length} ${lang === 'zh' ? '项指标' : 'indicators'}` : ''}</div>
  </div></div>`;
  return html;
}

function sentimentLabelZh(key) {
  const map = {
    fear_greed_index: '恐贪指数', bull_ratio: '看多比例', bear_ratio: '看空比例',
    neutral_ratio: '中性比例', sentiment_score: '情绪评分', market_breadth: '市场广度',
    advance_count: '上涨家数', decline_count: '下跌家数', turnover_rate: '换手率',
